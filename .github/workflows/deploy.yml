name: Build & Deploy to ahost

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write # needed to publish the release asset

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build (CI) → Release → Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (standalone)
        run: npm run build
        env:
          # Build never touches the DB, but envs must exist.
          DATABASE_URL: postgres://build:build@localhost:5432/build
          JWT_SECRET: build-time-secret-not-used-at-runtime
          NEXT_PUBLIC_APP_URL: https://uz-team.uz

      - name: Pack deploy artifact
        run: |
          # Standalone bundle already contains its own minimal node_modules,
          # plus public/ and .next/static (copied by the postbuild script).
          cp -r drizzle scripts .next/standalone/
          chmod +x .next/standalone/scripts/activate.sh
          tar -czf deploy.tar.gz -C .next/standalone .
          ls -lh deploy.tar.gz

      # ── Always publish the artifact as a GitHub Release ────────────────
      # The server can then pull it without SSH:
      #   curl -sL -o deploy.tar.gz \
      #     https://github.com/abdulaziz-itc/uzteam/releases/download/latest/deploy.tar.gz
      - name: Publish release asset ("latest")
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: "Auto-built deploy bundle for commit ${{ github.sha }}"
          files: deploy.tar.gz

      # ── Optional direct SSH deploy (works once ahost enables external SSH) ──
      - name: Check deploy secrets
        id: check
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SSH_HOST and/or DEPLOY_PATH secrets are not configured — skipping SSH deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact to server (SSH)
        if: steps.check.outputs.configured == 'true'
        continue-on-error: true # ahost external SSH is closed for now — release asset covers manual deploy
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          source: deploy.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Activate release on server (SSH)
        id: ssh_activate
        if: steps.check.outputs.configured == 'true'
        continue-on-error: true # see note above
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "── Cleaning previous release (keeps .env.local, tmp, logs) ──"
            rm -rf .next node_modules public app components lib messages i18n \
                   drizzle scripts .git server.js package.json package-lock.json \
                   next.config.ts tsconfig.json proxy.ts eslint.config.mjs \
                   postcss.config.mjs components.json README.md PROJECT.md DEPLOYMENT.md \
                   AGENTS.md CLAUDE.md

            echo "── Extracting new release ──"
            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz

            bash scripts/activate.sh

      - name: SSH deploy result notice
        if: steps.check.outputs.configured == 'true' && steps.ssh_activate.outcome != 'success'
        run: echo "::warning::SSH deploy failed or skipped — deploy manually from cPanel Terminal using the 'latest' release asset (see DEPLOYMENT.md)."

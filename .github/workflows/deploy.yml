name: Deploy to ahost

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-check:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          # Build does not need a real DB, but envs must exist
          DATABASE_URL: postgres://build:build@localhost:5432/build
          JWT_SECRET: build-time-secret-not-used-in-runtime
          NEXT_PUBLIC_APP_URL: https://example.com

  deploy:
    name: Deploy over SSH
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        id: check
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SSH_HOST and/or DEPLOY_PATH secrets are not configured yet — skipping deploy step."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy on server
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            # cPanel Node.js apps keep node/npm in a nodevenv — activate it if present
            for act in "$HOME"/nodevenv/*/*/bin/activate; do
              if [ -f "$act" ]; then source "$act"; break; fi
            done
            echo "node: $(node -v 2>/dev/null || echo 'NOT FOUND') / npm: $(npm -v 2>/dev/null || echo 'NOT FOUND')"

            echo "── Pulling latest main ──"
            git fetch origin main
            git reset --hard origin/main

            echo "── Installing dependencies ──"
            npm ci

            echo "── Building ──"
            npm run build

            echo "── Applying DB migrations (if any) ──"
            npm run db:migrate || echo "no migrations to apply"

            echo "── Restarting Passenger app ──"
            mkdir -p tmp && touch tmp/restart.txt

            echo "✅ Deploy finished"
